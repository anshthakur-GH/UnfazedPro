<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UnfazedPro | Workforce Intelligence OS</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #0D0D0D;
            --bg-sidebar: #111111;
            --bg-card: #161616;
            --bg-card-hover: #1E1E1E;
            --accent-primary: #FF7300;
            --accent-secondary: #FFAA00;
            --text-primary: #F0F0F0;
            --text-secondary: #888888;
            --text-muted: #555555;
            --border-subtle: rgba(255, 255, 255, 0.06);
            --card-radius: 14px;
            --card-shadow: 0 1px 3px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.03);
            --hover-shadow: 0 4px 12px rgba(255,115,0,0.05), 0 0 0 1px rgba(255,115,0,0.25);
        }
        body {
            font-family: 'Sora', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-primary);
            overflow: hidden;
            height: 100vh;
        }
        .metric-font { font-family: 'Space Mono', monospace; }
        .premium-card {
            background: var(--bg-card);
            border-radius: var(--card-radius);
            box-shadow: var(--card-shadow);
            border: 1px solid var(--border-subtle);
            transition: all 0.2s ease-out;
        }
        .premium-card:hover {
            transform: translateY(-2px);
            background: var(--bg-card-hover);
            box-shadow: var(--hover-shadow);
        }
        .mesh-gradient {
            background: radial-gradient(circle at top right, rgba(255,115,0,0.15) 0%, rgba(22,22,22,1) 70%);
        }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: var(--bg-base); }
        .custom-scroll::-webkit-scrollbar-thumb { background: var(--bg-card-hover); border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { PieChart, Pie, Cell, ResponsiveContainer, AreaChart, Area, Tooltip: RechartsTooltip } = Recharts;

        const Icon = ({ name, size = 18, color = "currentColor", className = "" }) => {
            useEffect(() => { lucide.createIcons(); }, []);
            return <i data-lucide={name} style={{ width: size, height: size, color }} className={className}></i>;
        };

        const SidebarItem = ({ icon, label, active }) => (
            <div className={`relative flex items-center gap-3 px-4 py-3 rounded-lg cursor-pointer mb-1 transition-colors ${active ? 'text-[#fff] font-semibold' : 'text-[#888] hover:bg-[#1e1e1e]'}`}>
                {active && <div className="absolute inset-0 bg-[#FF73001a] border border-[#FF730040] rounded-lg z-0" />}
                <Icon name={icon} size={18} className="z-10" color={active ? '#FF7300' : 'currentColor'} />
                <span className="text-[14px] z-10">{label}</span>
            </div>
        );

        const MetricCard = ({ label, value, delta, deltaUp, gauge }) => (
            <div className="premium-card p-6 flex-1">
                <div className="text-[10px] font-bold text-[#555] uppercase tracking-[0.1em] mb-3">{label}</div>
                <div className="flex items-center justify-between">
                    <div className="metric-font text-[30px] font-bold text-[#F0F0F0] leading-none">{value}</div>
                    {gauge && (
                        <div className="w-11 h-11">
                            <svg viewBox="0 0 36 36">
                                <circle cx="18" cy="18" r="16" fill="none" stroke="rgba(255,255,255,0.05)" strokeWidth="3" />
                                <circle cx="18" cy="18" r="16" fill="none" stroke="#FF7300" strokeWidth="3" strokeDasharray={`${gauge}, 100`} strokeLinecap="round" className="drop-shadow-[0_0_4px_#FF7300]" />
                            </svg>
                        </div>
                    )}
                </div>
                <div className={`text-[11px] font-bold mt-4 flex items-center gap-1 inline-flex bg-[#0000004d] px-2 py-1 rounded-md ${deltaUp ? 'text-[#a8ff3e]' : 'text-[#ff4444]'}`}>
                    <Icon name={deltaUp ? "trending-up" : "trending-down"} size={12} />
                    {delta}
                </div>
            </div>
        );

        const App = () => {
            const [data, setData] = useState(null);
            const [employees, setEmployees] = useState([]);
            const [appData, setAppData] = useState([]);
            const [trendData, setTrendData] = useState([]);

            useEffect(() => {
                const fetchAll = async () => {
                    try {
                        const [ov, emp, app, trend] = await Promise.all([
                            fetch('http://localhost:8000/api/overview').then(r => r.json()),
                            fetch('http://localhost:8000/api/employees').then(r => r.json()),
                            fetch('http://localhost:8000/api/activity-chart').then(r => r.json()),
                            fetch('http://localhost:8000/api/distraction-trend').then(r => r.json())
                        ]);
                        setData(ov);
                        setEmployees(emp);
                        setAppData(app);
                        setTrendData(trend);
                    } catch (e) {
                        console.error("Backend offline");
                    }
                };
                fetchAll();
                const interval = setInterval(fetchAll, 5000);
                return () => clearInterval(interval);
            }, []);

            if (!data) return <div className="h-screen w-screen flex items-center justify-center bg-[#0D0D0D] text-[#FF7300] font-mono tracking-tighter">BOOTING UNFAZEDPRO OS...</div>;

            return (
                <div className="flex h-screen overflow-hidden">
                    {/* Sidebar */}
                    <div className="w-[240px] bg-[#111] border-r border-white/5 p-6 flex flex-col">
                        <div className="flex items-center gap-3 mb-10 pl-2">
                            <div className="w-9 h-9 bg-gradient-to-br from-[#FF7300] to-[#FFAA00] rounded-xl flex items-center justify-center text-[#000] font-black text-lg shadow-[0_4px_14px_rgba(255,115,0,0.3)]">U</div>
                            <span className="text-[20px] font-bold tracking-tight">UnfazedPro</span>
                        </div>

                        <div className="bg-[#0D0D0D] px-4 py-2.5 rounded-xl border border-white/5 flex items-center gap-3 mb-8">
                            <Icon name="search" size={16} color="#555" />
                            <span className="text-[13px] text-[#555]">Search...</span>
                            <span className="ml-auto text-[11px] text-[#555] font-bold">⌘K</span>
                        </div>

                        <div className="text-[10px] font-bold text-[#555] uppercase tracking-[0.15em] mb-4 pl-2">Platform</div>
                        <SidebarItem icon="layout-grid" label="Dashboard" active />
                        <SidebarItem icon="users" label="Employees" />
                        <SidebarItem icon="bar-chart-3" label="Analytics" />
                        <SidebarItem icon="shield-alert" label="AI Agents" />

                        <div className="text-[10px] font-bold text-[#555] uppercase tracking-[0.15em] mb-4 mt-8 pl-2">Intelligence</div>
                        <SidebarItem icon="file-text" label="Reports" />
                        <SidebarItem icon="history" label="Audit Log" />

                        <div className="mt-auto p-4 bg-[#161616] rounded-xl border border-white/5">
                            <div className="text-[12px] font-bold text-[#FF7300] mb-1">PRO SYSTEM</div>
                            <div className="text-[11px] text-[#888]">Enterprise Monitoring Active</div>
                        </div>
                    </div>

                    {/* Main Content */}
                    <div className="flex-1 flex flex-col h-screen overflow-hidden bg-[#0D0D0D]">
                        <div className="h-16 border-b border-white/5 flex items-center justify-between px-8">
                            <div className="text-[12px] text-[#888] font-medium tracking-tight">DASHBOARDS / <span className="text-[#F0F0F0] font-semibold">OVERVIEW</span></div>
                            <div className="flex items-center gap-6 text-[#888]">
                                <div className="flex items-center gap-2 px-4 py-2 bg-[#161616] border border-white/5 rounded-xl text-[13px] cursor-pointer">Last 30 Days <Icon name="chevron-down" size={14} /></div>
                                <Icon name="refresh-cw" size={18} className="hover:text-white cursor-pointer" />
                                <Icon name="bell" size={18} className="hover:text-white cursor-pointer" />
                            </div>
                        </div>

                        <div className="flex-1 overflow-y-auto p-8 custom-scroll">
                            <h1 className="text-[24px] font-bold mb-8 tracking-tight text-[#F0F0F0]">Intelligence Overview</h1>

                            <div className="flex gap-5 mb-8">
                                <MetricCard label="Total Staff" value={data.active_employees} delta="+3 new this month" deltaUp />
                                <MetricCard label="Efficiency Index" value={`${data.avg_active_hours}h`} delta="8.2% boost" deltaUp />
                                <MetricCard label="Distraction Rate" value={`${data.avg_distraction_pct}%`} gauge={data.avg_distraction_pct} delta="2.1% drop" deltaUp />
                                <MetricCard label="AI Insights" value={data.proposals_generated} delta="4 pending review" deltaUp />
                            </div>

                            <div className="grid grid-cols-5 gap-5 mb-8">
                                <div className="col-span-3 premium-card p-8">
                                    <div className="flex justify-between mb-8">
                                        <div className="text-[16px] font-bold text-[#F0F0F0]">Behavioral Distribution</div>
                                        <Icon name="more-vertical" size={16} className="text-[#555]" />
                                    </div>
                                    <div className="flex gap-12 items-center">
                                        <div className="w-[220px] h-[220px] relative">
                                            <ResponsiveContainer width="100%" height="100%">
                                                <PieChart>
                                                    <Pie data={appData} innerRadius={70} outerRadius={95} paddingAngle={4} dataKey="value" stroke="none">
                                                        {appData.map((entry, index) => (
                                                            <Cell key={`cell-${index}`} fill={index === 0 ? '#FF7300' : `rgba(255, 115, 0, ${0.7 - index * 0.15})`} />
                                                        ))}
                                                    </Pie>
                                                </PieChart>
                                            </ResponsiveContainer>
                                            <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-center">
                                                <div className="metric-font text-2xl font-bold">{Math.round(data.avg_active_hours * 30)}h</div>
                                                <div className="text-[10px] text-[#555] font-bold uppercase tracking-widest">Monthly</div>
                                            </div>
                                        </div>
                                        <div className="flex-1">
                                            <div className="bg-[#0D0D0D] p-5 rounded-2xl mb-5 border border-white/5">
                                                <div className="text-[10px] font-bold text-[#555] uppercase tracking-widest mb-1">Peak window</div>
                                                <div className="metric-font text-lg font-bold">09:45 AM - 01:20 PM</div>
                                            </div>
                                            <div className="grid grid-cols-2 gap-x-6 gap-y-3">
                                                {appData.map((app, i) => (
                                                    <div key={app.name} className="flex justify-between text-[12px] pb-2 border-b border-white/5">
                                                        <span className="text-[#888]">{app.name}</span>
                                                        <span className="metric-font font-bold">{app.value}h</span>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div className="col-span-2 flex flex-col gap-5">
                                    <div className="premium-card p-6 flex-1">
                                        <div className="text-[10px] font-bold text-[#555] uppercase tracking-widest mb-4">Trends</div>
                                        <div className="h-32">
                                            <ResponsiveContainer width="100%" height="100%">
                                                <AreaChart data={trendData}>
                                                    <defs>
                                                        <linearGradient id="colorTr" x1="0" y1="0" x2="0" y2="1">
                                                            <stop offset="5%" stopColor="#FF7300" stopOpacity={0.3}/>
                                                            <stop offset="95%" stopColor="#FF7300" stopOpacity={0}/>
                                                        </linearGradient>
                                                    </defs>
                                                    <Area type="monotone" dataKey="value" stroke="#FF7300" strokeWidth={3} fillOpacity={1} fill="url(#colorTr)" />
                                                </AreaChart>
                                            </ResponsiveContainer>
                                        </div>
                                    </div>
                                    <div className="premium-card mesh-gradient p-8 relative overflow-hidden">
                                        <div className="absolute top-5 right-5 w-10 h-10 bg-[#FF73001a] border border-[#FF730033] rounded-xl flex items-center justify-center">
                                            <Icon name="zap" size={20} color="#FF7300" className="fill-[#FF7300]" />
                                        </div>
                                        <div className="text-lg font-bold mb-2">Agent 2 Proposed</div>
                                        <div className="text-[13px] text-[#888] mb-6 leading-relaxed">Automation workflow ready for <strong>Aryan Mehta</strong>. ROI: ₹18,400/mo.</div>
                                        <button className="w-full bg-[#FF7300] text-[#000] rounded-full py-3.5 font-bold text-sm shadow-[0_4px_14px_rgba(255,115,0,0.3)] hover:translate-y-[-1px] active:translate-y-[1px] transition-transform">ACTIVATE AUTOMATION</button>
                                    </div>
                                </div>
                            </div>

                            <div className="premium-card p-8 mb-10">
                                <div className="flex justify-between mb-8 text-[#F0F0F0]">
                                    <h2 className="text-lg font-bold">Workforce Intelligence</h2>
                                    <Icon name="more-vertical" size={20} className="text-[#555] cursor-pointer" />
                                </div>
                                <table className="w-full border-collapse">
                                    <thead>
                                        <tr className="text-left border-b border-white/5 text-[#555] text-[11px] uppercase font-bold tracking-[0.1em]">
                                            <th className="pb-4">Employee Identity</th>
                                            <th className="pb-4">Monitoring Level</th>
                                            <th className="pb-4">Distraction</th>
                                            <th className="pb-4">Estimated ROI</th>
                                        </tr>
                                    </thead>
                                    <tbody className="text-[14px]">
                                        {employees.map((emp, i) => (
                                            <tr key={emp.name} className={`border-b border-white/5 ${i === employees.length-1 ? 'border-none' : ''}`}>
                                                <td className="py-5 flex items-center gap-4">
                                                    <div className="w-10 h-10 rounded-xl bg-[#111] border border-white/5 flex items-center justify-center text-[13px] font-bold text-[#F0F0F0]">{emp.name[0]}</div>
                                                    <div>
                                                        <div className="font-semibold text-[#F0F0F0]">{emp.name}</div>
                                                        <div className="text-[12px] text-[#555]">{emp.email}</div>
                                                    </div>
                                                </td>
                                                <td>
                                                    <span className={`px-3 py-1 rounded-full text-[11px] font-bold border ${emp.phase === 2 ? 'bg-[#FF73001a] text-[#FF7300] border-[#FF73004d]' : 'bg-[#0D0D0D] text-[#555] border-white/5'}`}>
                                                        {emp.phase === 2 ? 'HIGH FIDELITY' : 'METADATA ONLY'}
                                                    </span>
                                                </td>
                                                <td className="metric-font font-bold text-[#F0F0F0]">{emp.distraction}%</td>
                                                <td className="metric-font font-bold text-[#FF7300]">{emp.roi ? `₹${emp.roi.toLocaleString()}` : '--'}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                    {/* Right Panel */}
                    <div className="w-[260px] bg-[#111] border-l border-white/5 p-8 flex flex-col overflow-y-auto custom-scroll">
                        <div className="text-[10px] font-bold text-[#555] uppercase tracking-widest mb-6">Live Updates</div>
                        <div className="flex flex-col gap-6">
                            <UpdateItem title="Phase 2 activated for Aryan Mehta." time="JUST NOW" icon="zap" color="#FF7300" />
                            <UpdateItem title="Daily report generated (24 staff)." time="1 HR AGO" icon="file-text" color="#555" />
                        </div>

                        <div className="text-[10px] font-bold text-[#555] uppercase tracking-widest mb-6 mt-12">Monitored Talent</div>
                        <div className="flex flex-col gap-2">
                            {employees.map((emp, i) => (
                                <div key={emp.name} className={`flex items-center gap-3 p-3 rounded-xl transition-all cursor-pointer ${i === 2 ? 'bg-[#FF7300] text-[#000]' : 'text-[#F0F0F0] hover:bg-[#161616]'}`}>
                                    <div className={`w-8 h-8 rounded-lg flex items-center justify-center text-[11px] font-bold ${i === 2 ? 'bg-[#0000001a]' : 'bg-[#161616]'}`}>{emp.name[0]}</div>
                                    <div className="text-[13px] font-semibold flex-1 truncate">{emp.name}</div>
                                    {i === 2 && <div className="flex gap-2"><Icon name="mail" size={14} /> <Icon name="phone" size={14} /></div>}
                                </div>
                            ))}
                        </div>

                        <div className="mt-auto pt-10">
                            <div className="premium-card bg-[#0D0D0D] p-5 text-center">
                                <div className="text-[10px] font-bold text-[#555] uppercase tracking-widest mb-2">Connection</div>
                                <div className="flex items-center justify-center gap-2">
                                    <div className="w-2 h-2 rounded-full bg-[#a8ff3e] shadow-[0_0_8px_#a8ff3e]"></div>
                                    <span className="text-[12px] font-bold tracking-tight">SECURE LINK</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const UpdateItem = ({ title, time, icon, color }) => (
            <div className="flex gap-4">
                <div className="w-9 h-9 rounded-xl flex items-center justify-center border border-white/5 bg-[#0D0D0D]" style={{ color }}>
                    <Icon name={icon} size={18} />
                </div>
                <div>
                    <div className="text-[13px] font-medium leading-snug text-[#F0F0F0]">{title}</div>
                    <div className="text-[11px] text-[#555] mt-1 font-bold">{time}</div>
                </div>
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
